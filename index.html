<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Photos - Black Mode PNG Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000000; /* Noir pur */
            overflow-x: hidden;
            color: white;
        }

        .glass { 
            background: rgba(18, 18, 18, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.8);
        }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px; height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .image-card:hover img { transform: scale(1.05); }

        .wm-preview {
            position: absolute;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        #clearBtn {
            transition: all 0.2s ease;
        }
        #clearBtn:hover {
            background-color: #ef4444;
            color: white;
        }

        .logo-preview-circle {
            width: 48px;
            height: 48px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-preview-circle img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        /* Style de l'interrupteur */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #2563eb; border-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Logique de l'accordéon */
        #wmContent {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }
        #wmContent.open {
            max-height: 500px;
            opacity: 1;
            margin-top: 1rem;
        }
        .chevron {
            transition: transform 0.3s ease;
        }
        .chevron.rotated {
            transform: rotate(180deg);
        }

        /* Barre de défilement personnalisée */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-6">

    <div class="w-full max-w-5xl z-10">
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tighter">
                <span style="color: #ff0050;">Tik</span>Tok <span class="text-white">Photos</span> <span class="text-blue-500 text-2xl block md:inline font-light italic">Ultra PNG</span>
            </h1>
            <div class="max-w-xl mx-auto">
                <p class="text-white/50 text-xs md:text-sm leading-relaxed px-4 text-center">
                    Téléchargez n'importe quelle photo TikTok en <strong>PNG haute résolution</strong>. Importez votre <strong>logo</strong> pour protéger et signer vos créations instantanément.
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
            <!-- Section de saisie URL -->
            <div class="lg:col-span-2 glass p-6 rounded-[2rem] flex flex-col justify-center">
                <label class="block text-[9px] font-bold uppercase tracking-[0.2em] mb-3 opacity-30 text-center lg:text-left">Lien TikTok</label>
                <div class="relative flex items-center bg-white/5 border border-white/10 rounded-xl overflow-hidden group focus-within:border-blue-500/50 transition-all">
                    <input id="urlInput" type="text" placeholder="Collez le lien ici..." 
                           class="w-full bg-transparent px-5 py-4 outline-none text-white pr-12 text-base text-center lg:text-left">
                    <button id="clearBtn" class="absolute right-3 p-1.5 rounded-lg bg-white/5 text-white/30 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    <div id="statusIndicator" class="hidden pr-4"><div class="loader"></div></div>
                </div>
            </div>

            <!-- Section Logo / Watermark -->
            <div class="glass p-6 rounded-[2rem] border-white/10 flex flex-col h-fit">
                <button id="toggleWm" class="flex items-center justify-between w-full group">
                    <div class="flex flex-col items-start">
                        <label class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-40 cursor-pointer">Watermark</label>
                        <span id="wmStatusText" class="text-[8px] font-black opacity-20 uppercase tracking-widest mt-0.5">Configurer</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <label class="switch" onclick="event.stopPropagation()">
                            <input type="checkbox" id="logoToggle" checked>
                            <span class="slider"></span>
                        </label>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-40 chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </button>

                <!-- Contenu dépliable -->
                <div id="wmContent">
                    <div class="flex items-center gap-3 p-2 bg-white/5 rounded-xl mb-4 border border-white/5">
                        <div class="logo-preview-circle" id="logoCirclePreview">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div class="flex-1">
                            <input type="file" id="logoUpload" accept="image/*" class="hidden">
                            <button onclick="document.getElementById('logoUpload').click()" class="w-full bg-blue-600/10 text-blue-400 border border-blue-500/10 rounded-lg py-1.5 text-[10px] font-black hover:bg-blue-600 hover:text-white transition-all uppercase tracking-wider">
                                Importer
                            </button>
                        </div>
                    </div>

                    <div id="logoControls" class="space-y-4 opacity-20 pointer-events-none transition-opacity duration-300">
                        <div class="grid grid-cols-3 gap-1.5">
                            <button data-pos="top-left" class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">H.G.</button>
                            <button data-pos="top-center" class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">H.M.</button>
                            <button data-pos="top-right" class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">H.D.</button>
                            <button data-pos="bottom-left" class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">B.G.</button>
                            <button data-pos="bottom-center" class="pos-btn p-2 bg-blue-600 rounded-lg border border-blue-400 text-[8px] font-black shadow-lg uppercase">B.M.</button>
                            <button data-pos="bottom-right" class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">B.D.</button>
                        </div>

                        <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                            <div class="flex justify-between mb-2 items-center">
                                <label class="text-[9px] uppercase font-bold opacity-30 tracking-wider">Taille</label>
                                <span id="sizeVal" class="text-[9px] font-black text-blue-400">15%</span>
                            </div>
                            <input type="range" id="wmSize" min="5" max="50" value="15" class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section Résultats -->
        <div id="resultContainer" class="hidden">
            <div class="glass p-5 rounded-[2rem] mb-6 flex flex-col md:flex-row items-center justify-between gap-4 border-white/10">
                <div class="flex items-center gap-4">
                    <div class="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg" id="photoCount">0</div>
                    <div>
                        <p class="font-bold text-white text-sm leading-tight">Images PNG</p>
                        <p class="text-[9px] text-white/30 uppercase font-black">Prêt pour l'export</p>
                    </div>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button id="downloadSeparatelyBtn" class="bg-white/5 text-white p-3.5 rounded-xl hover:bg-white/10 border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <button id="downloadAllBtn" class="flex-1 bg-white text-black font-black py-3.5 px-8 rounded-xl hover:bg-blue-50 transition-all flex items-center justify-center gap-2 uppercase text-[11px] tracking-widest">
                        Télécharger tout (ZIP)
                    </button>
                </div>
            </div>
            <div id="imageGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20"></div>
        </div>
    </div>

    <canvas id="renderCanvas" class="hidden"></canvas>

    <!-- Modal de succès -->
    <div id="thanksModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 backdrop-blur-md hidden">
        <div class="glass max-w-xs w-full p-8 rounded-[2.5rem] text-center border-white/20 shadow-2xl">
            <div class="w-16 h-16 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">✨</span>
            </div>
            <h3 class="text-xl font-black mb-2">Export Terminé</h3>
            <p class="text-white/40 text-xs mb-6 leading-relaxed">Images sauvegardées.</p>
            <button onclick="document.getElementById('thanksModal').classList.add('hidden')" class="w-full bg-white text-black font-black py-3.5 rounded-xl transition-all uppercase text-[10px] tracking-widest">Fermer</button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const clearBtn = document.getElementById('clearBtn');
        const logoUpload = document.getElementById('logoUpload');
        const logoCirclePreview = document.getElementById('logoCirclePreview');
        const wmSizeInput = document.getElementById('wmSize');
        const logoControls = document.getElementById('logoControls');
        const imageGrid = document.getElementById('imageGrid');
        const resultContainer = document.getElementById('resultContainer');
        const statusIndicator = document.getElementById('statusIndicator');
        const logoToggle = document.getElementById('logoToggle');
        
        const toggleWm = document.getElementById('toggleWm');
        const wmContent = document.getElementById('wmContent');
        const chevron = document.querySelector('.chevron');
        const wmStatusText = document.getElementById('wmStatusText');

        let currentPhotos = [];
        let logoImage = null;
        let wmPosition = 'bottom-center';

        toggleWm.addEventListener('click', () => {
            wmContent.classList.toggle('open');
            chevron.classList.toggle('rotated');
            if (wmContent.classList.contains('open')) {
                wmStatusText.textContent = "Configuration";
                wmStatusText.classList.remove('opacity-20');
                wmStatusText.classList.add('text-blue-400', 'opacity-80');
            } else {
                wmStatusText.textContent = logoImage ? "Logo chargé" : "Configurer";
                wmStatusText.classList.add('opacity-20');
                wmStatusText.classList.remove('text-blue-400', 'opacity-80');
            }
        });

        urlInput.addEventListener('input', () => {
            const val = urlInput.value.trim();
            clearBtn.classList.toggle('hidden', val === '');
            if (val.includes('tiktok.com')) {
                fetchTikTokPhotos(val);
            }
        });

        clearBtn.addEventListener('click', () => {
            urlInput.value = '';
            clearBtn.classList.add('hidden');
            resultContainer.classList.add('hidden');
            urlInput.focus();
        });

        logoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    logoImage = img;
                    logoControls.classList.remove('opacity-20', 'pointer-events-none');
                    logoCirclePreview.innerHTML = `<img src="${event.target.result}" alt="Logo">`;
                    wmStatusText.textContent = "Logo actif";
                    updateAllPreviews();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        logoToggle.addEventListener('change', () => {
            updateAllPreviews();
        });

        document.querySelectorAll('.pos-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pos-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'border-blue-400', 'font-black', 'shadow-lg');
                    b.classList.add('bg-white/5', 'border-white/5', 'font-bold');
                });
                btn.classList.add('bg-blue-600', 'border-blue-400', 'font-black', 'shadow-lg');
                btn.classList.remove('bg-white/5', 'border-white/5', 'font-bold');
                wmPosition = btn.dataset.pos;
                updateAllPreviews();
            });
        });

        wmSizeInput.addEventListener('input', () => {
            document.getElementById('sizeVal').textContent = wmSizeInput.value + '%';
            updateAllPreviews();
        });

        function updateAllPreviews() {
            const previews = document.querySelectorAll('.wm-preview');
            const isLogoActive = logoToggle.checked && logoImage;

            previews.forEach(preview => {
                if (!isLogoActive) {
                    preview.classList.add('hidden');
                    return;
                }

                preview.src = logoImage.src;
                preview.style.width = wmSizeInput.value + '%';
                preview.style.top = 'auto'; preview.style.bottom = 'auto';
                preview.style.left = 'auto'; preview.style.right = 'auto';
                preview.style.transform = 'none';
                preview.style.margin = '10px';
                
                const [y, x] = wmPosition.split('-');
                preview.style[y] = '0';
                if (x === 'center') {
                    preview.style.left = '50%';
                    preview.style.transform = 'translateX(-50%)';
                } else {
                    preview.style[x] = '0';
                }
                preview.classList.remove('hidden');
            });
        }

        async function fetchTikTokPhotos(url) {
            statusIndicator.classList.remove('hidden');
            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if (data.code === 0 && data.data.images) {
                    currentPhotos = data.data.images;
                    renderGrid();
                }
            } catch (err) {
                console.error("Erreur : ", err);
            } finally {
                statusIndicator.classList.add('hidden');
            }
        }

        function renderGrid() {
            imageGrid.innerHTML = '';
            currentPhotos.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = "image-card glass rounded-[1.5rem] overflow-hidden relative aspect-[3/4] group border-white/5";
                div.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover transition-transform duration-1000 ease-in-out group-hover:scale-110">
                    <img src="" class="wm-preview hidden shadow-2xl drop-shadow-2xl">
                    <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center p-6">
                        <button onclick="downloadWithWatermark('${url}', ${index})" class="bg-white text-black w-full py-3 rounded-xl text-[9px] font-black tracking-widest uppercase shadow-xl transition-transform active:scale-90">
                            Exporter
                        </button>
                    </div>
                `;
                imageGrid.appendChild(div);
            });
            resultContainer.classList.remove('hidden');
            document.getElementById('photoCount').textContent = currentPhotos.length;
            updateAllPreviews();
        }

        async function processImage(photoUrl) {
            return new Promise((resolve) => {
                const canvas = document.getElementById('renderCanvas');
                const ctx = canvas.getContext('2d');
                const mainImg = new Image();
                const applyWatermark = logoToggle.checked && logoImage;

                mainImg.crossOrigin = "anonymous";
                mainImg.onload = () => {
                    canvas.width = mainImg.naturalWidth;
                    canvas.height = mainImg.naturalHeight;
                    ctx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);
                    
                    if (applyWatermark) {
                        const scale = wmSizeInput.value / 100;
                        const wmWidth = canvas.width * scale;
                        const wmHeight = (logoImage.height / logoImage.width) * wmWidth;
                        const margin = canvas.width * 0.04; 
                        
                        let x = margin; let y = margin;
                        const [posY, posX] = wmPosition.split('-');
                        
                        if (posX === 'right') x = canvas.width - wmWidth - margin;
                        if (posX === 'center') x = (canvas.width / 2) - (wmWidth / 2);
                        if (posY === 'bottom') y = canvas.height - wmHeight - margin;
                        
                        ctx.drawImage(logoImage, x, y, wmWidth, wmHeight);
                    }
                    
                    canvas.toBlob(resolve, 'image/png'); 
                };
                mainImg.src = photoUrl;
            });
        }

        async function downloadWithWatermark(url, index) {
            const blob = await processImage(url);
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `photo_${index + 1}.png`;
            link.click();
        }

        document.getElementById('downloadAllBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadAllBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.textContent = "Chargement...";
            const zip = new JSZip();
            const folder = zip.folder("Photos");
            
            for (let i = 0; i < currentPhotos.length; i++) {
                const blob = await processImage(currentPhotos[i]);
                folder.file(`photo_${i + 1}.png`, blob);
            }
            
            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `TikTok_Pack.zip`;
            link.click();
            btn.disabled = false;
            btn.innerHTML = originalText;
            document.getElementById('thanksModal').classList.remove('hidden');
        });

        document.getElementById('downloadSeparatelyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadSeparatelyBtn');
            btn.disabled = true;
            btn.innerHTML = `<div class="loader"></div>`;

            for (let i = 0; i < currentPhotos.length; i++) {
                const blob = await processImage(currentPhotos[i]);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `photo_${i + 1}.png`;
                link.click();
                await new Promise(r => setTimeout(r, 600)); 
            }

            btn.disabled = false;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>`;
            document.getElementById('thanksModal').classList.remove('hidden');
        });
    </script>
</body>
</html>
