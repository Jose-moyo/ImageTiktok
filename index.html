<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image TikTok</title>

    <!-- FAVICON (Icône de l'onglet - texte du nom) -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23ffffff'/%3E%3Ctext x='50' y='38' font-family='Arial,sans-serif' font-size='22' font-weight='bold' fill='%23000000' text-anchor='middle'%3EImage%3C/text%3E%3Ctext x='50' y='68' font-family='Arial,sans-serif' font-size='22' font-weight='bold' fill='%23000000' text-anchor='middle'%3ETikTok%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;800&display=swap');

        /* Logo TikTok stylisé */
        .tiktok-logo {
            position: relative;
            display: inline-block;
            color: #ffffff;
            text-shadow:
                -2px -1px 0px #25F4EE,
                2px 1px 0px #FE2C55;
            letter-spacing: -0.05em;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            overflow-x: hidden;
            color: white;
            padding-top: 80px;
            /* Espace pour le header fixe */
        }

        .glass {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.8);
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .image-card:hover img {
            transform: scale(1.05);
        }

        .wm-preview {
            position: absolute;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        #clearBtn:hover {
            background-color: #ef4444;
            color: white;
        }

        .logo-preview-circle {
            width: 48px;
            height: 48px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .logo-preview-circle img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        /* Interrupteur */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #2563eb;
            border-color: #3b82f6;
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        /* Accordéon */
        #wmContent {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }

        #wmContent.open {
            max-height: 500px;
            opacity: 1;
            margin-top: 1rem;
        }

        .chevron {
            transition: transform 0.3s ease;
        }

        .chevron.rotated {
            transform: rotate(180deg);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center">

    <!-- HEADER / ENTÊTE -->
    <header class="fixed top-0 left-0 right-0 z-50 h-20 flex items-center px-6 md:px-12">
        <div class="w-full max-w-7xl mx-auto flex justify-center md:justify-start items-center">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-extrabold tracking-tighter tiktok-logo">
                    Image TikTok
                </h1>
            </div>
        </div>
    </header>

    <!-- CONTENU PRINCIPAL -->
    <div class="w-full max-w-5xl z-10 p-4 md:p-6">

        <!-- Sous-titre descriptif -->
        <div class="text-center mb-12 mt-4">
            <p class="text-white/70 text-xs md:text-sm leading-relaxed px-4 max-w-2xl mx-auto font-bold">
                Téléchargez n'importe quelle photo TikTok en <strong>PNG haute résolution</strong>. Importez votre
                <strong>logo</strong> pour protéger et signer vos créations instantanément.
            </p>
        </div>

        <!-- Notification d'erreur ou d'information -->
        <div id="infoMessage"
            class="hidden glass border-yellow-500/30 p-4 rounded-2xl mb-6 text-center text-sm text-yellow-500"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-10">
            <!-- Section URL -->
            <div class="lg:col-span-2 glass p-8 rounded-[2rem] flex flex-col justify-center">
                <label
                    class="block text-[9px] font-bold uppercase tracking-[0.2em] mb-4 opacity-30 text-center lg:text-left">Lien
                    de la publication TikTok</label>
                <div
                    class="relative flex items-center bg-white border border-gray-200 rounded-2xl overflow-hidden group focus-within:border-blue-500/50 transition-all shadow-inner">
                    <input id="urlInput" type="text" placeholder="https://www.tiktok.com/@user/photo/..."
                        class="w-full bg-transparent px-6 py-5 outline-none text-black placeholder-gray-400 pr-14 text-base text-center lg:text-left">
                    <button id="clearBtn" class="absolute right-4 p-2 rounded-xl bg-gray-100 text-gray-400 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    <div id="statusIndicator" class="hidden pr-6">
                        <div class="loader"></div>
                    </div>
                </div>
            </div>

            <!-- Section Watermark -->
            <div class="glass p-6 rounded-[2rem] border-white/10 flex flex-col h-fit">
                <button id="toggleWm" class="flex items-center justify-between w-full group">
                    <div class="flex flex-col items-start">
                        <label
                            class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-40 cursor-pointer">Watermark
                            / Logo</label>
                        <span id="wmStatusText"
                            class="text-[8px] font-black opacity-20 uppercase tracking-widest mt-0.5">Configuration</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <label class="switch" onclick="event.stopPropagation()">
                            <input type="checkbox" id="logoToggle" checked>
                            <span class="slider"></span>
                        </label>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-40 chevron" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </button>

                <div id="wmContent">
                    <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl mb-4 border border-white/5">
                        <div class="logo-preview-circle" id="logoCirclePreview">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-20" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div class="flex-1">
                            <input type="file" id="logoUpload" accept="image/*" class="hidden">
                            <button onclick="document.getElementById('logoUpload').click()"
                                class="w-full bg-blue-600/10 text-blue-400 border border-blue-500/10 rounded-lg py-2 text-[10px] font-black hover:bg-blue-600 hover:text-white transition-all uppercase tracking-wider">
                                Charger Logo
                            </button>
                        </div>
                    </div>

                    <div id="logoControls"
                        class="space-y-4 opacity-20 pointer-events-none transition-opacity duration-300">
                        <div class="grid grid-cols-3 gap-1.5">
                            <button data-pos="top-left"
                                class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">H.G.</button>
                            <button data-pos="top-center"
                                class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">H.M.</button>
                            <button data-pos="top-right"
                                class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">H.D.</button>
                            <button data-pos="bottom-left"
                                class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">B.G.</button>
                            <button data-pos="bottom-center"
                                class="pos-btn p-2 bg-blue-600 rounded-lg border border-blue-400 text-[8px] font-black shadow-lg uppercase">B.M.</button>
                            <button data-pos="bottom-right"
                                class="pos-btn p-2 bg-white/5 rounded-lg border border-white/5 text-[8px] font-bold hover:bg-white/10 uppercase">B.D.</button>
                        </div>

                        <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                            <div class="flex justify-between mb-2 items-center">
                                <label class="text-[9px] uppercase font-bold opacity-30 tracking-wider">Échelle
                                    logo</label>
                                <span id="sizeVal" class="text-[9px] font-black text-blue-400">15%</span>
                            </div>
                            <input type="range" id="wmSize" min="5" max="50" value="15"
                                class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section Résultats -->
        <div id="resultContainer" class="hidden">
            <div
                class="glass p-5 rounded-[2rem] mb-8 flex flex-col md:flex-row items-center justify-between gap-4 border-white/10">
                <div class="flex items-center gap-4">
                    <div class="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg"
                        id="photoCount">0</div>
                    <div>
                        <p class="font-bold text-white text-sm leading-tight">Images PNG Extraites</p>
                        <p class="text-[9px] text-white/30 uppercase font-black tracking-widest">Génération haute
                            qualité</p>
                    </div>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button id="downloadSeparatelyBtn" title="Téléchargements individuels"
                        class="bg-white/5 text-white p-3.5 rounded-xl hover:bg-white/10 border border-white/10 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <button id="downloadAllBtn"
                        class="flex-1 bg-white text-black font-black py-3.5 px-8 rounded-xl hover:bg-blue-50 transition-all flex items-center justify-center gap-2 uppercase text-[11px] tracking-widest shadow-xl">
                        Télécharger tout (ZIP)
                    </button>
                </div>
            </div>
            <div id="imageGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 pb-20"></div>
        </div>
    </div>

    <canvas id="renderCanvas" class="hidden"></canvas>

    <!-- Modal succès -->
    <div id="thanksModal"
        class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 backdrop-blur-md hidden">
        <div class="glass max-w-xs w-full p-8 rounded-[2.5rem] text-center border-white/20 shadow-2xl">
            <div class="w-16 h-16 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">✨
            </div>
            <h3 class="text-xl font-black mb-2">Export Terminé</h3>
            <p class="text-white/40 text-[10px] mb-6 leading-relaxed uppercase tracking-wider">Vos images haute
                résolution sont prêtes.</p>
            <button onclick="document.getElementById('thanksModal').classList.add('hidden')"
                class="w-full bg-white text-black font-black py-4 rounded-xl transition-all uppercase text-[10px] tracking-widest active:scale-95">Fermer</button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const clearBtn = document.getElementById('clearBtn');
        const logoUpload = document.getElementById('logoUpload');
        const logoCirclePreview = document.getElementById('logoCirclePreview');
        const wmSizeInput = document.getElementById('wmSize');
        const logoControls = document.getElementById('logoControls');
        const imageGrid = document.getElementById('imageGrid');
        const resultContainer = document.getElementById('resultContainer');
        const statusIndicator = document.getElementById('statusIndicator');
        const logoToggle = document.getElementById('logoToggle');
        const infoMessage = document.getElementById('infoMessage');

        const toggleWm = document.getElementById('toggleWm');
        const wmContent = document.getElementById('wmContent');
        const chevron = document.querySelector('.chevron');
        const wmStatusText = document.getElementById('wmStatusText');

        let currentPhotos = [];
        let logoImage = null;
        let wmPosition = 'bottom-center';

        // Auto-remplissage via l'URL (ex: depuis Telegram)
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const urlParam = params.get('url');
            if (urlParam) {
                const cleanedParam = cleanAndDecodeUrl(urlParam);
                urlInput.value = cleanedParam;
                clearBtn.classList.remove('hidden');

                if (cleanedParam.includes('tiktok.com')) {
                    fetchTikTokPhotos(cleanedParam);
                }
            }
        });

        // Nettoyage et normalisation de l'URL TikTok
        function cleanAndDecodeUrl(rawUrl) {
            let processed = rawUrl.trim();
            try {
                processed = decodeURIComponent(processed);
            } catch (e) {
                console.warn("Échec du décodage de l'URL brute:", e);
            }
            // Enlever les paramètres de tracking (?_r=1, ?_t=, ?is_from_webapp=, etc.)
            if (processed.includes('?')) {
                processed = processed.split('?')[0];
            }
            return processed;
        }

        toggleWm.addEventListener('click', () => {
            wmContent.classList.toggle('open');
            chevron.classList.toggle('rotated');
            if (wmContent.classList.contains('open')) {
                wmStatusText.textContent = "Configuration";
                wmStatusText.classList.remove('opacity-20');
                wmStatusText.classList.add('text-blue-400', 'opacity-80');
            } else {
                wmStatusText.textContent = logoImage ? "Logo chargé" : "Configurer";
                wmStatusText.classList.add('opacity-20');
                wmStatusText.classList.remove('text-blue-400', 'opacity-80');
            }
        });

        urlInput.addEventListener('input', () => {
            const rawVal = urlInput.value.trim();
            clearBtn.classList.toggle('hidden', rawVal === '');
            infoMessage.classList.add('hidden');

            if (rawVal.includes('tiktok.com')) {
                const cleanVal = cleanAndDecodeUrl(rawVal);
                fetchTikTokPhotos(cleanVal);
            }
        });

        clearBtn.addEventListener('click', () => {
            urlInput.value = '';
            clearBtn.classList.add('hidden');
            resultContainer.classList.add('hidden');
            infoMessage.classList.add('hidden');
            urlInput.focus();
        });

        logoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    logoImage = img;
                    logoControls.classList.remove('opacity-20', 'pointer-events-none');
                    logoCirclePreview.innerHTML = `<img src="${event.target.result}" alt="Logo">`;
                    wmStatusText.textContent = "Logo actif";
                    updateAllPreviews();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        logoToggle.addEventListener('change', updateAllPreviews);

        document.querySelectorAll('.pos-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pos-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'border-blue-400', 'font-black', 'shadow-lg');
                    b.classList.add('bg-white/5', 'border-white/5', 'font-bold');
                });
                btn.classList.add('bg-blue-600', 'border-blue-400', 'font-black', 'shadow-lg');
                btn.classList.remove('bg-white/5', 'border-white/5', 'font-bold');
                wmPosition = btn.dataset.pos;
                updateAllPreviews();
            });
        });

        wmSizeInput.addEventListener('input', () => {
            document.getElementById('sizeVal').textContent = wmSizeInput.value + '%';
            updateAllPreviews();
        });

        function updateAllPreviews() {
            const previews = document.querySelectorAll('.wm-preview');
            const isLogoActive = logoToggle.checked && logoImage;
            previews.forEach(preview => {
                if (!isLogoActive) { preview.classList.add('hidden'); return; }
                preview.src = logoImage.src;
                preview.style.width = wmSizeInput.value + '%';
                preview.style.top = 'auto'; preview.style.bottom = 'auto';
                preview.style.left = 'auto'; preview.style.right = 'auto';
                preview.style.transform = 'none';
                preview.style.margin = '12px';
                const [y, x] = wmPosition.split('-');
                preview.style[y] = '0';
                if (x === 'center') {
                    preview.style.left = '50%';
                    preview.style.transform = 'translateX(-50%)';
                } else {
                    preview.style[x] = '0';
                }
                preview.classList.remove('hidden');
            });
        }

        // Récupération des données avec prise en charge des redirections de liens mobiles
        async function fetchTikTokPhotos(url) {
            statusIndicator.classList.remove('hidden');
            infoMessage.classList.add('hidden');

            try {
                // Utilisation de l'API tikwm.com avec l'URL nettoyée et encodée
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    if (data.data.images && data.data.images.length > 0) {
                        currentPhotos = data.data.images;
                        renderGrid();
                    } else if (data.data.play) {
                        showInfo("Cette publication contient une vidéo unique, pas un diaporama de photos.");
                        resultContainer.classList.add('hidden');
                    } else {
                        showInfo("Aucune photo ou vidéo exploitable n'a été trouvée sur ce lien.");
                        resultContainer.classList.add('hidden');
                    }
                } else {
                    showInfo("Impossible d'extraire le contenu. Vérifiez l'URL ou réessayez plus tard.");
                    resultContainer.classList.add('hidden');
                    console.warn("API TikTok Error:", data.msg);
                }
            } catch (err) {
                showInfo("Une erreur réseau est survenue lors du chargement des images.");
                resultContainer.classList.add('hidden');
                console.error("Erreur de récupération : ", err);
            } finally {
                statusIndicator.classList.add('hidden');
            }
        }

        function showInfo(msg) {
            infoMessage.textContent = msg;
            infoMessage.classList.remove('hidden');
        }

        function renderGrid() {
            imageGrid.innerHTML = '';
            currentPhotos.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = "image-card glass rounded-[1.5rem] overflow-hidden relative aspect-[3/4] group border-white/5";
                div.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover transition-transform duration-1000 ease-in-out group-hover:scale-110">
                    <img src="" class="wm-preview hidden shadow-2xl drop-shadow-2xl">
                    <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center p-6">
                        <button onclick="downloadWithWatermark('${url}', ${index})" class="bg-white text-black w-full py-3 rounded-xl text-[9px] font-black tracking-widest uppercase shadow-xl transition-transform active:scale-90">
                            Exporter PNG
                        </button>
                    </div>
                `;
                imageGrid.appendChild(div);
            });
            resultContainer.classList.remove('hidden');
            document.getElementById('photoCount').textContent = currentPhotos.length;
            updateAllPreviews();
        }

        async function processImage(photoUrl) {
            return new Promise((resolve) => {
                const canvas = document.getElementById('renderCanvas');
                const ctx = canvas.getContext('2d');

                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                const mainImg = new Image();
                const applyWatermark = logoToggle.checked && logoImage;
                mainImg.crossOrigin = "anonymous";
                mainImg.onload = () => {
                    canvas.width = mainImg.naturalWidth;
                    canvas.height = mainImg.naturalHeight;
                    ctx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);

                    if (applyWatermark) {
                        const scale = wmSizeInput.value / 100;
                        const wmWidth = canvas.width * scale;
                        const wmHeight = (logoImage.height / logoImage.width) * wmWidth;
                        const margin = canvas.width * 0.04;
                        let x = margin; let y = margin;
                        const [posY, posX] = wmPosition.split('-');

                        if (posX === 'right') x = canvas.width - wmWidth - margin;
                        if (posX === 'center') x = (canvas.width / 2) - (wmWidth / 2);
                        if (posY === 'bottom') y = canvas.height - wmHeight - margin;

                        ctx.drawImage(logoImage, x, y, wmWidth, wmHeight);
                    }
                    canvas.toBlob(resolve, 'image/png');
                };
                mainImg.src = photoUrl;
            });
        }

        async function downloadWithWatermark(url, index) {
            const blob = await processImage(url);
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tiktok_ultra_${index + 1}.png`;
            link.click();
        }

        document.getElementById('downloadAllBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadAllBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true; btn.textContent = "Traitement...";
            const zip = new JSZip();
            const folder = zip.folder("TikTok_Photos_Ultra");
            for (let i = 0; i < currentPhotos.length; i++) {
                const blob = await processImage(currentPhotos[i]);
                folder.file(`photo_${i + 1}.png`, blob);
            }
            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `Pack_TikTok_PNG.zip`;
            link.click();
            btn.disabled = false; btn.innerHTML = originalText;
            document.getElementById('thanksModal').classList.remove('hidden');
        });

        document.getElementById('downloadSeparatelyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadSeparatelyBtn');
            btn.disabled = true; btn.innerHTML = `<div class="loader"></div>`;
            for (let i = 0; i < currentPhotos.length; i++) {
                const blob = await processImage(currentPhotos[i]);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `photo_${i + 1}.png`;
                link.click();
                await new Promise(r => setTimeout(r, 600));
            }
            btn.disabled = false;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>`;
            document.getElementById('thanksModal').classList.remove('hidden');
        });
    </script>
</body>
