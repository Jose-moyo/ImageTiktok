<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Photos - Black Mode PNG Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000000; /* Noir pur */
            overflow-x: hidden;
            color: white;
        }

        .glass { 
            background: rgba(18, 18, 18, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.8);
        }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px; height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .image-card:hover img { transform: scale(1.05); }

        .wm-preview {
            position: absolute;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        #clearBtn {
            transition: all 0.2s ease;
        }
        #clearBtn:hover {
            background-color: #ef4444;
            color: white;
        }

        .logo-preview-circle {
            width: 64px;
            height: 64px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-preview-circle img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        /* Switch Style */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #2563eb; border-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="w-full max-w-5xl z-10">
        <div class="text-center mb-10">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-4 tracking-tighter">
                <span style="color: #ff0050;">Tik</span>Tok <span class="text-white">Photos</span> <span class="text-blue-500 text-3xl block md:inline font-light">PNG Ultra</span>
            </h1>
            <p class="text-white/40 text-lg">Exportation sans perte sur fond noir absolu.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <!-- Section de saisie URL -->
            <div class="lg:col-span-2 glass p-8 rounded-[2.5rem] flex flex-col justify-center">
                <label class="block text-[10px] font-bold uppercase tracking-[0.2em] mb-4 opacity-40">Lien de la publication</label>
                <div class="relative flex items-center bg-white/5 border border-white/10 rounded-2xl overflow-hidden group focus-within:border-blue-500/50 transition-all">
                    <input id="urlInput" type="text" placeholder="Collez le lien TikTok ici..." 
                           class="w-full bg-transparent px-6 py-6 outline-none text-white pr-12 text-lg">
                    <button id="clearBtn" class="absolute right-4 p-2 rounded-lg bg-white/5 text-white/30 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    <div id="statusIndicator" class="hidden pr-6"><div class="loader"></div></div>
                </div>
                <div id="statusBox" class="mt-4 text-sm font-bold hidden px-4 py-3 rounded-xl border border-white/5"></div>
            </div>

            <!-- Section Logo / Contrôles cadrée -->
            <div class="glass p-8 rounded-[2.5rem] border-white/10">
                <div class="flex items-center justify-between mb-6">
                    <label class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-50">Watermark</label>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-black opacity-40 uppercase">Activé</span>
                        <label class="switch">
                            <input type="checkbox" id="logoToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Zone d'importation -->
                <div class="flex items-center gap-4 p-3 bg-white/5 rounded-2xl mb-6 border border-white/5">
                    <div class="logo-preview-circle" id="logoCirclePreview">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="flex-1">
                        <input type="file" id="logoUpload" accept="image/*" class="hidden">
                        <button onclick="document.getElementById('logoUpload').click()" class="w-full bg-blue-600/10 text-blue-400 border border-blue-500/20 rounded-xl py-2.5 text-[11px] font-bold hover:bg-blue-600 hover:text-white transition-all uppercase tracking-wider">
                            Charger logo
                        </button>
                    </div>
                </div>

                <!-- Contrôles détaillés -->
                <div id="logoControls" class="space-y-6 opacity-20 pointer-events-none transition-opacity duration-300">
                    <div>
                        <label class="block text-[10px] uppercase mb-3 opacity-40 font-bold tracking-widest text-center">Position du Watermark</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button data-pos="top-left" class="pos-btn p-2.5 bg-white/5 rounded-xl border border-white/5 text-[9px] font-bold transition-all hover:bg-white/10 uppercase">Haut G.</button>
                            <button data-pos="top-center" class="pos-btn p-2.5 bg-white/5 rounded-xl border border-white/5 text-[9px] font-bold transition-all hover:bg-white/10 uppercase">Haut M.</button>
                            <button data-pos="top-right" class="pos-btn p-2.5 bg-white/5 rounded-xl border border-white/5 text-[9px] font-bold transition-all hover:bg-white/10 uppercase">Haut D.</button>
                            <button data-pos="bottom-left" class="pos-btn p-2.5 bg-white/5 rounded-xl border border-white/5 text-[9px] font-bold transition-all hover:bg-white/10 uppercase">Bas G.</button>
                            <button data-pos="bottom-center" class="pos-btn p-2.5 bg-blue-600 rounded-xl border border-blue-400 text-[9px] font-black transition-all shadow-[0_0_15px_rgba(37,99,235,0.3)] uppercase">Bas M.</button>
                            <button data-pos="bottom-right" class="pos-btn p-2.5 bg-white/5 rounded-xl border border-white/5 text-[9px] font-bold transition-all hover:bg-white/10 uppercase">Bas D.</button>
                        </div>
                    </div>

                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <div class="flex justify-between mb-3 items-center">
                            <label class="text-[10px] uppercase font-bold opacity-40 tracking-wider">Taille Relative</label>
                            <span id="sizeVal" class="px-2 py-0.5 bg-blue-600/20 text-blue-400 rounded-md text-[10px] font-black">15%</span>
                        </div>
                        <input type="range" id="wmSize" min="5" max="50" value="15" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    </div>
                </div>
            </div>
        </div>

        <!-- Section Résultats -->
        <div id="resultContainer" class="hidden">
            <div class="glass p-6 rounded-[2.5rem] mb-8 flex flex-col md:flex-row items-center justify-between gap-4 border-white/10 shadow-2xl">
                <div class="flex items-center gap-5">
                    <div class="h-12 w-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-lg text-white shadow-[0_0_25px_rgba(37,99,235,0.5)]" id="photoCount">0</div>
                    <div>
                        <p class="font-black text-white leading-none mb-1">Images PNG Générées</p>
                        <p class="text-[10px] text-white/30 uppercase tracking-widest font-bold">Prêt pour téléchargement HD</p>
                    </div>
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <button id="downloadSeparatelyBtn" title="Téléchargement individuel" class="bg-white/5 text-white font-bold py-4 px-5 rounded-2xl hover:bg-white/10 transition-all border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <button id="downloadAllBtn" class="flex-1 bg-white text-black font-black py-4 px-10 rounded-2xl hover:bg-blue-50 transition-all flex items-center justify-center gap-3 uppercase text-sm tracking-tighter">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0l-4 4m4-4v12" />
                        </svg>
                        Télécharger le pack ZIP
                    </button>
                </div>
            </div>
            <div id="imageGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 pb-20"></div>
        </div>
    </div>

    <canvas id="renderCanvas" class="hidden"></canvas>

    <!-- Modal de succès -->
    <div id="thanksModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 backdrop-blur-md hidden">
        <div class="glass max-w-sm w-full p-10 rounded-[3rem] text-center border-white/20 shadow-[0_0_50px_rgba(0,0,0,1)]">
            <div class="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">💎</span>
            </div>
            <h3 class="text-2xl font-black mb-3">Traitement Terminé</h3>
            <p class="text-white/40 text-sm mb-8 leading-relaxed">Vos fichiers PNG ont été exportés avec une précision chirurgicale (Lossless 100%).</p>
            <button onclick="document.getElementById('thanksModal').classList.add('hidden')" class="w-full bg-white text-black font-black py-4 rounded-2xl transition-all active:scale-95 uppercase text-sm tracking-widest">Fermer</button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const clearBtn = document.getElementById('clearBtn');
        const logoUpload = document.getElementById('logoUpload');
        const logoCirclePreview = document.getElementById('logoCirclePreview');
        const wmSizeInput = document.getElementById('wmSize');
        const logoControls = document.getElementById('logoControls');
        const imageGrid = document.getElementById('imageGrid');
        const resultContainer = document.getElementById('resultContainer');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusBox = document.getElementById('statusBox');
        const logoToggle = document.getElementById('logoToggle');

        let currentPhotos = [];
        let logoImage = null;
        let wmPosition = 'bottom-center';

        urlInput.addEventListener('input', () => {
            const val = urlInput.value.trim();
            clearBtn.classList.toggle('hidden', val === '');
            if (val.includes('tiktok.com')) {
                fetchTikTokPhotos(val);
            }
        });

        clearBtn.addEventListener('click', () => {
            urlInput.value = '';
            clearBtn.classList.add('hidden');
            statusBox.classList.add('hidden');
            resultContainer.classList.add('hidden');
            urlInput.focus();
        });

        logoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    logoImage = img;
                    logoControls.classList.remove('opacity-20', 'pointer-events-none');
                    logoCirclePreview.innerHTML = `<img src="${event.target.result}" alt="Logo">`;
                    updateAllPreviews();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        logoToggle.addEventListener('change', () => {
            updateAllPreviews();
        });

        document.querySelectorAll('.pos-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pos-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'border-blue-400', 'font-black', 'shadow-[0_0_15px_rgba(37,99,235,0.3)]');
                    b.classList.add('bg-white/5', 'border-white/5', 'font-bold');
                });
                btn.classList.add('bg-blue-600', 'border-blue-400', 'font-black', 'shadow-[0_0_15_rgba(37,99,235,0.3)]');
                btn.classList.remove('bg-white/5', 'border-white/5', 'font-bold');
                wmPosition = btn.dataset.pos;
                updateAllPreviews();
            });
        });

        wmSizeInput.addEventListener('input', () => {
            document.getElementById('sizeVal').textContent = wmSizeInput.value + '%';
            updateAllPreviews();
        });

        function updateAllPreviews() {
            const previews = document.querySelectorAll('.wm-preview');
            const isLogoActive = logoToggle.checked && logoImage;

            previews.forEach(preview => {
                if (!isLogoActive) {
                    preview.classList.add('hidden');
                    return;
                }

                preview.src = logoImage.src;
                preview.style.width = wmSizeInput.value + '%';
                preview.style.top = 'auto'; preview.style.bottom = 'auto';
                preview.style.left = 'auto'; preview.style.right = 'auto';
                preview.style.transform = 'none';
                preview.style.margin = '10px';
                
                const [y, x] = wmPosition.split('-');
                preview.style[y] = '0';
                if (x === 'center') {
                    preview.style.left = '50%';
                    preview.style.transform = 'translateX(-50%)';
                } else {
                    preview.style[x] = '0';
                }
                preview.classList.remove('hidden');
            });
        }

        async function fetchTikTokPhotos(url) {
            statusIndicator.classList.remove('hidden');
            statusBox.classList.add('hidden');
            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if (data.code === 0 && data.data.images) {
                    currentPhotos = data.data.images;
                    renderGrid();
                    statusBox.textContent = `Succès : ${currentPhotos.length} images PNG détectées`;
                    statusBox.className = "mt-4 text-[11px] font-bold block px-4 py-3 rounded-xl bg-blue-500/10 text-blue-400 border border-blue-500/20 uppercase tracking-widest";
                } else {
                    throw new Error("Lien incompatible ou non-diaporama");
                }
            } catch (err) {
                statusBox.textContent = `Erreur : ${err.message}`;
                statusBox.className = "mt-4 text-[11px] font-bold block px-4 py-3 rounded-xl bg-red-900/40 text-red-400 border border-red-500/20 uppercase tracking-widest";
                resultContainer.classList.add('hidden');
            } finally {
                statusIndicator.classList.add('hidden');
            }
        }

        function renderGrid() {
            imageGrid.innerHTML = '';
            currentPhotos.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = "image-card glass rounded-[2rem] overflow-hidden relative aspect-[3/4] group border-white/5";
                div.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover transition-transform duration-1000 ease-in-out group-hover:scale-110">
                    <img src="" class="wm-preview hidden shadow-2xl drop-shadow-2xl">
                    <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center p-8">
                        <button onclick="downloadWithWatermark('${url}', ${index})" class="bg-white text-black w-full py-4 rounded-2xl text-[10px] font-black tracking-widest uppercase shadow-xl transition-transform active:scale-90">
                            Exporter PNG
                        </button>
                    </div>
                `;
                imageGrid.appendChild(div);
            });
            resultContainer.classList.remove('hidden');
            document.getElementById('photoCount').textContent = currentPhotos.length;
            updateAllPreviews();
        }

        async function processImage(photoUrl) {
            return new Promise((resolve) => {
                const canvas = document.getElementById('renderCanvas');
                const ctx = canvas.getContext('2d');
                const mainImg = new Image();
                const applyWatermark = logoToggle.checked && logoImage;

                mainImg.crossOrigin = "anonymous";
                mainImg.onload = () => {
                    canvas.width = mainImg.naturalWidth;
                    canvas.height = mainImg.naturalHeight;
                    ctx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);
                    
                    if (applyWatermark) {
                        const scale = wmSizeInput.value / 100;
                        const wmWidth = canvas.width * scale;
                        const wmHeight = (logoImage.height / logoImage.width) * wmWidth;
                        const margin = canvas.width * 0.04; 
                        
                        let x = margin; let y = margin;
                        const [posY, posX] = wmPosition.split('-');
                        
                        if (posX === 'right') x = canvas.width - wmWidth - margin;
                        if (posX === 'center') x = (canvas.width / 2) - (wmWidth / 2);
                        if (posY === 'bottom') y = canvas.height - wmHeight - margin;
                        
                        ctx.drawImage(logoImage, x, y, wmWidth, wmHeight);
                    }
                    
                    canvas.toBlob(resolve, 'image/png'); 
                };
                mainImg.src = photoUrl;
            });
        }

        async function downloadWithWatermark(url, index) {
            const blob = await processImage(url);
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tiktok_png_ultra_${index + 1}.png`;
            link.click();
        }

        document.getElementById('downloadAllBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadAllBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.textContent = "Assemblage ZIP...";
            const zip = new JSZip();
            const folder = zip.folder("TikTok_PNG_Ultra");
            
            for (let i = 0; i < currentPhotos.length; i++) {
                const blob = await processImage(currentPhotos[i]);
                folder.file(`photo_${i + 1}.png`, blob);
            }
            
            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `TikTok_Ultra_Pack.zip`;
            link.click();
            btn.disabled = false;
            btn.innerHTML = originalText;
            document.getElementById('thanksModal').classList.remove('hidden');
        });

        document.getElementById('downloadSeparatelyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadSeparatelyBtn');
            btn.disabled = true;
            btn.innerHTML = `<div class="loader"></div>`;

            for (let i = 0; i < currentPhotos.length; i++) {
                const blob = await processImage(currentPhotos[i]);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `photo_ultra_${i + 1}.png`;
                link.click();
                await new Promise(r => setTimeout(r, 600)); 
            }

            btn.disabled = false;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>`;
            document.getElementById('thanksModal').classList.remove('hidden');
        });
    </script>
</body>
</html>
